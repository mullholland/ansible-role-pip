---
# Initialise empty for later merging
pip_packages_merged: []

pip_os_packages_map:
  RedHat:
    "8":
      - "python3-pip"
      - "python3-setuptools"
    "9":
      - "python3-pip"
      - "python3-setuptools"
    "10":
      - "python3-pip"
      - "python3-setuptools"
  Amazon:
    - "python2-pip"
    - "python-setuptools"
  default:
    - "python3-pip"
    - "python3-setuptools"
# yamllint disable-line rule:line-length
pip_os_packages: "{{ pip_os_packages_map[ansible_facts['distribution']][ansible_facts['distribution_major_version']] | default(pip_os_packages_map[ansible_facts['distribution']]) | default(pip_os_packages_map['default']) }}"

pip_package_map:
  RedHat:
    "8":
      - "pip"
      - "setuptools"
    "9":
      - "pip"
      - "setuptools"
    "10":
      - "pip"
      - "setuptools"
  default:
    - "pip"
    - "setuptools"

# yamllint disable-line rule:line-length
pip_package: "{{ pip_package_map[ansible_facts['distribution']][ansible_facts['distribution_major_version']] | default(pip_package_map[ansible_facts['distribution']]) | default(pip_package_map['default']) }}"
